name: "continuous integration"
on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
permissions:
  contents: read
env:
  RUST_TOOLCHAIN_VERSION: 1.88.0
  CARGO_DENY_VERSION: 0.18.3
  CARGO_AUDIT_VERSION: 0.22.0
  CARGO_NEXTEST_VERSION: 0.9.100
jobs:
  fmt:
    name: format
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: "Check out the repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: "Set up Rust"
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
          components: rustfmt
      - name: "Restore the Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: "Run repository formatting gate"
        run: "make fmt"
    if: "${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}"
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: "Check out the repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: "Install Linux build dependencies"
        run: "sudo apt-get update && sudo apt-get install --yes pkg-config libfontconfig1-dev libfreetype6-dev"
      - name: "Set up Rust"
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
          components: clippy
      - name: "Restore the Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: "Run repository lint gate"
        run: "make lint"
    if: "${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}"
  audit:
    name: "dependency audit"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: "Check out the repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: "Set up Rust"
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
      - name: "Restore the Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: "Install Rust audit tools"
        run: "cargo install --locked cargo-deny --version \"${{ env.CARGO_DENY_VERSION }}\" && cargo install --locked cargo-audit --version \"${{ env.CARGO_AUDIT_VERSION }}\""
      - name: "Run repository audit gate"
        run: "make audit"
    if: "${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}"
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: "Check out the repository"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: "Install Linux build dependencies"
        run: "sudo apt-get update && sudo apt-get install --yes pkg-config libfontconfig1-dev libfreetype6-dev"
      - name: "Set up Rust"
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: "${{ env.RUST_TOOLCHAIN_VERSION }}"
      - name: "Restore the Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: "Install cargo-nextest"
        run: "cargo install --locked cargo-nextest --version \"${{ env.CARGO_NEXTEST_VERSION }}\""
      - name: "Run repository test gate"
        run: "make test"
    if: "${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}"
