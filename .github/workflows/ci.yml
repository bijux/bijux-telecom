name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Repo hygiene gate
        run: |
          if find . -name '.DS_Store' -o -name '._*' | grep -q .; then
            echo "Found forbidden files (.DS_Store or ._*)."
            find . -name '.DS_Store' -o -name '._*'
            exit 1
          fi
      - name: Fmt check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Panic/unwrap guard (warn)
        run: |
          if rg -n --glob 'src/**/*.rs' \
            --glob '!**/tests/**' \
            --glob '!**/benches/**' \
            --glob '!**/examples/**' \
            'panic!\\(|todo!\\(|unimplemented!\\(|\\.unwrap\\(|\\.expect\\(' .; then
            echo "Found panic/todo/unimplemented/unwrap/expect in src/. Treating as warning for now."
          fi
      - name: Tests (workspace)
        run: cargo test --workspace
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Toolchain info
        run: |
          rustc --version
          channel=$(sed -n 's/^channel = \"\\(.*\\)\"/\\1/p' rust-toolchain.toml)
          active=$(rustup show active-toolchain | awk '{print $1}')
          if [[ -n "$channel" && "$active" != "$channel"* ]]; then
            echo "Active toolchain ($active) does not match rust-toolchain.toml ($channel)"
            exit 1
          fi
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-make,cargo-audit,cargo-llvm-cov,cargo-semver-checks
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.60
      - name: Core unit tests (fast signal)
        run: cargo test -p bijux-gnss-core
      - name: No-default-features build (workspace)
        run: cargo build --workspace --no-default-features
      - name: Minimal engine build (core + signal + receiver)
        run: cargo build -p bijux-gnss-core -p bijux-gnss-signal -p bijux-gnss-receiver --no-default-features
      - name: Cargo make (ci)
        run: cargo make ci
      - name: Rustdoc warnings as errors (core)
        run: RUSTDOCFLAGS="-D warnings" cargo doc -p bijux-gnss-core --no-deps
      - name: Rustdoc warnings as errors
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Cargo tree snapshot (cli)
        run: |
          mkdir -p artifacts
          cargo tree -p bijux-gnss-cli > artifacts/cargo-tree-bijux-gnss-cli.txt
      - name: Benchmarks (warn-only)
        run: scripts/bench_compare.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cargo-tree-bijux-gnss-cli
          path: artifacts/cargo-tree-bijux-gnss-cli.txt
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: artifacts/benchmarks.txt
      - name: Semver checks (core/infra)
        run: |
          cargo semver-checks check-release -p bijux-gnss-core
          cargo semver-checks check-release -p bijux-gnss-infra
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
      - name: Coverage summary
        run: cargo llvm-cov --workspace --summary-only

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.78.0"
      - name: MSRV build
        run: cargo build --workspace
