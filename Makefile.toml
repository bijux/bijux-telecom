[config]
skip_core_tasks = true

[tasks.fmt-check]
command = "make"
args = ["fmt-rs"]

[tasks.clippy]
command = "make"
args = ["lint-rs"]

[tasks.test]
command = "make"
args = ["test-rs"]

[tasks.test-full]
command = "make"
args = ["test-all-rs"]

[tasks.audit]
command = "make"
args = ["audit-rs"]

[tasks.doc]
command = "make"
args = ["docs-check"]

[tasks.bench-compare]
command = "make"
args = ["bench-compare"]

[tasks.lint]
dependencies = ["fmt-check", "clippy"]

[tasks.ci]
command = "make"
args = ["ci"]

[tasks.ci-fast]
command = "make"
args = ["ci-fast"]

[tasks.ci-pr]
command = "make"
args = ["ci-pr"]

[tasks.ci-nightly]
command = "make"
args = ["ci-nightly"]

[tasks.ci-docs]
command = "make"
args = ["ci-docs"]

[tasks.ci-dependency-lock-refresh]
command = "make"
args = ["ci-dependency-lock-refresh"]
