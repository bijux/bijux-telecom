INHERIT: mkdocs.shared.yml

site_name: Bijux GNSS
site_description: GNSS command, signal, receiver, navigation, and reproducibility documentation.
site_url: !ENV [SITE_URL, https://bijux.io/bijux-gnss/]
site_author: Bijan Mousavi <bijan@bijux.io>
repo_url: https://github.com/bijux/bijux-gnss
repo_name: bijux/bijux-gnss
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: artifacts/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - .bijux/shared/bijux-docs
  - mkdocs.yml
  - mkdocs.shared.yml

extra:
  bijux:
    repository: bijux-gnss
    nav_mode: default
    theme_key: bijux:theme
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
